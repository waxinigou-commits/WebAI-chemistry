<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebAI Chemistry Lab · 实验器材画布版</title>
    <meta name="description" content="WebAI Chemistry v0.6.1，带基础拖拽的实验器材画布版原型。" />
    <style>
      :root {
        --bg: #1f242c;
        --bg-2: #252b34;
        --canvas: #313842;
        --canvas-2: #2b313a;
        --panel: rgba(31, 38, 48, 0.94);
        --panel-soft: rgba(44, 52, 64, 0.96);
        --panel-line: rgba(255,255,255,0.08);
        --text: #eef3f8;
        --muted: #97a4b2;
        --muted-2: #768291;
        --cyan: #76d8ff;
        --cyan-soft: rgba(118, 216, 255, 0.12);
        --green: #93f28f;
        --green-soft: rgba(147, 242, 143, 0.12);
        --yellow: #ffd776;
        --orange: #ffb36a;
        --danger: #ff8f8f;
        --shadow: 0 18px 48px rgba(0,0,0,0.26);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      .apparatus, .apparatus * { touch-action: none; }
      body {
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        color: var(--text);
      }

      button { font: inherit; }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 56px 1fr 78px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 16px;
        padding: 0 16px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        background: rgba(19, 24, 31, 0.82);
        backdrop-filter: blur(12px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
      }

      .brand-badge {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #67d8ff, #74a2ff);
        color: #162029;
        box-shadow: var(--shadow);
      }

      .experiment-title {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }

      .icon-btn,
      .category-btn,
      .library-item,
      .step-btn,
      .primary-action {
        border: 1px solid rgba(255,255,255,0.08);
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        cursor: pointer;
        background: rgba(255,255,255,0.03);
        color: var(--text);
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 320px;
        min-height: 0;
      }

      .canvas-shell {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 10%, rgba(255,255,255,0.03), transparent 34%),
          linear-gradient(180deg, var(--canvas) 0%, var(--canvas-2) 100%);
      }

      .canvas-shell::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 160px;
        background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.08));
        pointer-events: none;
      }

      .bench-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
        background-size: 44px 44px;
        opacity: 0.35;
        pointer-events: none;
      }

      .workspace {
        position: absolute;
        inset: 0;
      }

      .hint-tag {
        position: absolute;
        left: 16px;
        top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(18, 23, 29, 0.82);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--text);
        font-size: 13px;
        z-index: 5;
        box-shadow: var(--shadow);
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 14px rgba(147, 242, 143, 0.55);
      }

      .zoom-tag {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(19,24,31,0.82);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--muted);
        font-size: 13px;
        z-index: 5;
      }

      .drag-tip {
        position: absolute;
        right: 18px;
        top: 14px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(19,24,31,0.82);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--muted);
        font-size: 12px;
        z-index: 5;
      }

      .apparatus {
        position: absolute;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
        user-select: none;
      }

      .apparatus.draggable { cursor: grab; }
      .apparatus.dragging {
        cursor: grabbing;
        z-index: 30 !important;
        transform: scale(1.02);
        filter: drop-shadow(0 16px 24px rgba(0,0,0,0.28));
      }

      .apparatus.selected {
        filter: drop-shadow(0 0 18px rgba(118,216,255,0.24));
      }

      .stand {
        width: 140px;
        height: 380px;
      }

      .stand-base {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 102px;
        height: 20px;
        border-radius: 8px 8px 12px 12px;
        background: linear-gradient(180deg, #606a75, #404854);
        box-shadow: 0 8px 14px rgba(0,0,0,0.16);
      }

      .stand-rod {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 18px;
        width: 6px;
        height: 330px;
        border-radius: 999px;
        background: linear-gradient(180deg, #c8d0d8, #78818c);
      }

      .clamp-bar {
        position: absolute;
        top: 140px;
        left: 34px;
        width: 72px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, #b7bec6, #717983);
      }

      .main-tube {
        width: 560px;
        height: 84px;
      }

      .tube-body {
        position: absolute;
        left: 48px;
        top: 16px;
        width: 410px;
        height: 24px;
        border-radius: 999px;
        border: 3px solid rgba(255,255,255,0.72);
        background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
        box-shadow: inset 0 0 18px rgba(255,255,255,0.08);
      }

      .tube-fill {
        position: absolute;
        left: 56px;
        top: 23px;
        height: 10px;
        width: var(--tube-fill, 110px);
        border-radius: 999px;
        background: linear-gradient(90deg, #ffe58e, #ffb86c);
      }

      .tube-tip {
        position: absolute;
        left: 454px;
        top: 23px;
        width: 24px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #dab98e, #bb9260);
      }

      .tube-bend {
        position: absolute;
        left: 468px;
        top: 20px;
        width: 30px;
        height: 70px;
        border-right: 4px solid rgba(255,255,255,0.7);
        border-top: 4px solid rgba(255,255,255,0.7);
        border-top-right-radius: 18px;
      }

      .gasbag {
        position: absolute;
        left: 0;
        top: 8px;
        width: 62px;
        height: 40px;
        border-radius: 999px;
        background: radial-gradient(circle at 32% 28%, #f5d88f, #b47f2d);
        box-shadow: 0 10px 18px rgba(0,0,0,0.2);
      }

      .gasbag::after {
        content: 'CO';
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #52340f;
        font-size: 13px;
        font-weight: 800;
      }

      .burner {
        width: 96px;
        height: 128px;
      }

      .burner-stand {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 74px;
        height: 18px;
        border-radius: 10px;
        background: linear-gradient(180deg, #c7cdd5, #808995);
      }

      .burner-body {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 42px;
        height: 52px;
        border-radius: 16px 16px 10px 10px;
        background: linear-gradient(180deg, #d3942a, #8c5c14);
        box-shadow: 0 10px 14px rgba(0,0,0,0.16);
      }

      .burner-neck {
        position: absolute;
        bottom: 58px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 20px;
        border-radius: 7px;
        background: linear-gradient(180deg, #b58c51, #7b5b2a);
      }

      .burner-flame {
        position: absolute;
        bottom: 74px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 32px;
        border-radius: 50% 50% 42% 42%;
        background: radial-gradient(circle at 50% 18%, #fff6c3, #ff9343 72%);
        opacity: var(--flame-opacity, 0.16);
      }

      .tail-tube {
        width: 88px;
        height: 214px;
      }

      .tail-glass {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0;
        width: 38px;
        height: 190px;
        border-radius: 0 0 20px 20px;
        border: 3px solid rgba(255,255,255,0.72);
        background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02));
      }

      .tail-liquid {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 10px;
        width: 24px;
        height: var(--tail-liquid, 46px);
        border-radius: 0 0 16px 16px;
        background: linear-gradient(180deg, rgba(121,232,255,0.92), rgba(74,151,255,0.78));
      }

      .tail-hose {
        position: absolute;
        left: 0;
        top: 16px;
        width: 56px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #d9bd95, #bb905c);
        transform: rotate(-12deg);
        transform-origin: right center;
      }

      .bottle-group {
        display: flex;
        gap: 16px;
        align-items: end;
      }

      .bottle {
        width: 56px;
        height: 82px;
        position: relative;
      }

      .bottle-cap {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 12px;
        border-radius: 6px 6px 0 0;
        background: #c1c7cf;
      }

      .bottle-body {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 68px;
        border-radius: 14px;
        border: 2px solid rgba(255,255,255,0.55);
        background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
      }

      .bottle-label {
        position: absolute;
        left: 6px;
        right: 6px;
        top: 28px;
        padding: 4px 6px;
        border-radius: 6px;
        background: rgba(255,255,255,0.78);
        color: #25323c;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
      }

      .small-tool {
        position: absolute;
      }

      .spoon-shape {
        width: 96px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #cc744f, #ff9f63);
        position: relative;
      }

      .spoon-shape::before {
        content: '';
        position: absolute;
        right: -8px;
        top: -4px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(180deg, #ffb27d, #dd7e4e);
      }

      .match-shape {
        width: 62px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, #d1bc99, #8d6030);
        position: relative;
      }

      .match-shape::before {
        content: '';
        position: absolute;
        left: -2px;
        top: -2px;
        width: 10px;
        height: 12px;
        border-radius: 6px;
        background: #b74d32;
      }

      .library {
        border-left: 1px solid rgba(255,255,255,0.05);
        background: linear-gradient(180deg, rgba(33,39,48,0.98) 0%, rgba(28,34,43,0.98) 100%);
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 0;
      }

      .library-head {
        padding: 14px 14px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .library-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .library-head p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 13px;
      }

      .categories {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .category-btn {
        border-radius: 12px;
        padding: 10px 8px;
        cursor: pointer;
        background: rgba(255,255,255,0.03);
        color: var(--text);
      }

      .category-btn.active {
        background: rgba(118,216,255,0.12);
        border-color: rgba(118,216,255,0.34);
      }

      .library-list {
        padding: 14px;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .library-item {
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
        background: rgba(255,255,255,0.03);
        color: var(--text);
        text-align: left;
      }

      .library-item:hover,
      .library-item.active {
        background: rgba(118,216,255,0.12);
        border-color: rgba(118,216,255,0.34);
      }

      .library-item strong {
        display: block;
        margin-bottom: 6px;
      }

      .library-item span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .bottombar {
        display: grid;
        grid-template-columns: 1.2fr 1.2fr 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 0 14px;
        border-top: 1px solid rgba(255,255,255,0.05);
        background: rgba(19,24,31,0.84);
        backdrop-filter: blur(12px);
      }

      .stepper,
      .status-line,
      .records {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .step-btn {
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        background: rgba(255,255,255,0.03);
        color: var(--text);
      }

      .step-btn.active {
        background: rgba(147,242,143,0.1);
        border-color: rgba(147,242,143,0.34);
      }

      .status-pill,
      .record-pill {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .primary-action {
        padding: 12px 16px;
        border-radius: 12px;
        background: linear-gradient(135deg, #6ad6ff, #83f0db);
        color: #1a242d;
        font-weight: 800;
        cursor: pointer;
      }

      @media (max-width: 1180px) {
        .main { grid-template-columns: 1fr; }
        .library { min-height: 420px; }
        .bottombar {
          grid-template-columns: 1fr;
          padding: 10px 14px;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-badge">⚗️</div>
          <div>WebAI Chemistry Lab</div>
        </div>
        <div class="experiment-title">一氧化碳还原氧化铜 · 实验器材画布 v0.6.1</div>
        <div class="toolbar">
          <button class="icon-btn" title="重置">↺</button>
          <button class="icon-btn" title="缩小">－</button>
          <button class="icon-btn" title="放大">＋</button>
          <button class="icon-btn" title="帮助">?</button>
        </div>
      </header>

      <main class="main">
        <section class="canvas-shell">
          <div class="bench-grid"></div>
          <div class="hint-tag"><span class="dot"></span><span id="hintText">当前步骤：确认装置位置后，点火加热，再观察试管与尾气处理变化。</span></div>
          <div class="drag-tip">可直接拖动画布中的器材</div>
          <div class="workspace" id="workspace">
            <div class="apparatus stand draggable" data-drag="stand-left" style="left: 96px; top: 320px; z-index: 2;">
              <div class="stand-rod"></div>
              <div class="clamp-bar"></div>
              <div class="stand-base"></div>
            </div>
            <div class="apparatus stand draggable" data-drag="stand-right" style="left: 238px; top: 320px; z-index: 2;">
              <div class="stand-rod"></div>
              <div class="clamp-bar"></div>
              <div class="stand-base"></div>
            </div>

            <div class="apparatus main-tube draggable selected" data-drag="main-tube" style="left: 54px; top: 86px; z-index: 6;">
              <div class="gasbag"></div>
              <div class="tube-body"></div>
              <div class="tube-fill" id="tubeFill"></div>
              <div class="tube-tip"></div>
              <div class="tube-bend"></div>
            </div>

            <div class="apparatus burner draggable" data-drag="burner" style="left: 174px; top: 178px; z-index: 5;">
              <div class="burner-flame" id="burnerFlame"></div>
              <div class="burner-neck"></div>
              <div class="burner-body"></div>
              <div class="burner-stand"></div>
            </div>

            <div class="apparatus tail-tube draggable" data-drag="tail-tube" style="left: 324px; top: 118px; z-index: 7;">
              <div class="tail-hose"></div>
              <div class="tail-glass"></div>
              <div class="tail-liquid" id="tailLiquid"></div>
            </div>

            <div class="apparatus bottle-group draggable" data-drag="bottles" style="left: 374px; top: 198px; z-index: 7;">
              <div class="bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-body"></div>
                <div class="bottle-label">CuO</div>
              </div>
              <div class="bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-body"></div>
                <div class="bottle-label">Ca(OH)₂</div>
              </div>
              <div class="bottle">
                <div class="bottle-cap"></div>
                <div class="bottle-body"></div>
                <div class="bottle-label">Cu</div>
              </div>
            </div>

            <div class="apparatus small-tool draggable" data-drag="match" style="left: 382px; top: 272px; z-index: 7;">
              <div class="match-shape"></div>
            </div>
            <div class="apparatus small-tool draggable" data-drag="spoon" style="left: 430px; top: 266px; z-index: 7;">
              <div class="spoon-shape"></div>
            </div>
          </div>
          <div class="zoom-tag">73%</div>
        </section>

        <aside class="library">
          <div class="library-head">
            <h2>器材与药品库</h2>
            <p>先把形态做成器材画布，再逐步补真实装配关系。当前已支持基础拖动，先解决“像页面，不像实验台”的问题。</p>
          </div>
          <div class="categories" id="categories"></div>
          <div class="library-list" id="libraryList"></div>
        </aside>
      </main>

      <footer class="bottombar">
        <div class="stepper" id="stepper"></div>
        <div class="status-line">
          <div class="status-pill" id="statusPill">装置状态：基础装置已摆放</div>
          <div class="status-pill" id="reactionPill">反应状态：尚未加热</div>
          <div class="status-pill" id="tailPill">尾气处理：待观察</div>
        </div>
        <div class="records">
          <div class="record-pill" id="recordPill">观察记录：这版先解决质感、图标与不可拖动问题。</div>
        </div>
        <button class="primary-action" id="primaryAction">执行当前步骤</button>
      </footer>
    </div>

    <script>
      const categories = [
        { id: 'device', name: '仪器', items: [
          { id: 'stand', name: '铁架台', desc: '支撑玻璃管与实验装置。' },
          { id: 'tube', name: '硬质玻璃管', desc: '主反应发生区。' },
          { id: 'burner', name: '酒精灯', desc: '提供持续加热。' },
          { id: 'tailtube', name: '尾气试管', desc: '观察尾气处理与液面变化。' }
        ]},
        { id: 'reagent', name: '药品', items: [
          { id: 'co', name: '一氧化碳', desc: '还原剂，经导气系统进入反应区。' },
          { id: 'cuo', name: '氧化铜', desc: '被还原的黑色固体。' },
          { id: 'lime', name: '石灰水', desc: '尾气处理与现象观察。' },
          { id: 'cu', name: '铜', desc: '反应产物对照。' }
        ]},
        { id: 'tool', name: '工具', items: [
          { id: 'match', name: '火柴', desc: '点燃酒精灯。' },
          { id: 'spoon', name: '药匙', desc: '辅助取放药品。' },
          { id: 'move', name: '移动模式', desc: '当前画布中的器材可直接拖动。' },
          { id: 'reset', name: '复位工具', desc: '后续可一键还原装置。' }
        ]}
      ];

      const steps = [
        {
          id: 'setup',
          name: '步骤 1 · 摆装置',
          hint: '拖动铁架台、主玻璃管和试管，先把装置摆顺。',
          status: '装置状态：基础装置已摆放',
          reaction: '反应状态：尚未加热',
          tail: '尾气处理：待观察',
          record: '观察记录：先把实验台做得像器材画布，而不是信息页。',
          flame: 0.16,
          fill: 120,
          tailLiquid: 46
        },
        {
          id: 'ignite',
          name: '步骤 2 · 点燃酒精灯',
          hint: '点火后，主反应管开始受热，实验进入过程阶段。',
          status: '装置状态：酒精灯已点燃',
          reaction: '反应状态：主反应区开始受热',
          tail: '尾气处理：继续导气',
          record: '观察记录：点火以后，画布开始有过程感。',
          flame: 0.98,
          fill: 190,
          tailLiquid: 46
        },
        {
          id: 'observe',
          name: '步骤 3 · 观察现象',
          hint: '观察受热区与尾气试管变化，后续应继续补局部放大与颜色变化。',
          status: '装置状态：加热稳定',
          reaction: '反应状态：氧化铜正在被还原',
          tail: '尾气处理：液面变化更明显',
          record: '观察记录：现在已经更像实验台，但还缺装配关系与真实实验动画。',
          flame: 0.98,
          fill: 270,
          tailLiquid: 78
        }
      ];

      let activeCategory = 'device';
      let activeTool = 'stand';
      let activeStep = 'setup';

      const categoriesEl = document.getElementById('categories');
      const libraryListEl = document.getElementById('libraryList');
      const stepperEl = document.getElementById('stepper');
      const hintTextEl = document.getElementById('hintText');
      const statusPillEl = document.getElementById('statusPill');
      const reactionPillEl = document.getElementById('reactionPill');
      const tailPillEl = document.getElementById('tailPill');
      const recordPillEl = document.getElementById('recordPill');
      const primaryActionEl = document.getElementById('primaryAction');
      const tubeFillEl = document.getElementById('tubeFill');
      const burnerFlameEl = document.getElementById('burnerFlame');
      const tailLiquidEl = document.getElementById('tailLiquid');

      function renderCategories() {
        categoriesEl.innerHTML = categories.map(category => `
          <button class="category-btn ${category.id === activeCategory ? 'active' : ''}" data-category="${category.id}">${category.name}</button>
        `).join('');
      }

      function renderLibrary() {
        const current = categories.find(category => category.id === activeCategory);
        libraryListEl.innerHTML = current.items.map(item => `
          <button class="library-item ${item.id === activeTool ? 'active' : ''}" data-item="${item.id}">
            <strong>${item.name}</strong>
            <span>${item.desc}</span>
          </button>
        `).join('');
      }

      function renderSteps() {
        stepperEl.innerHTML = steps.map(step => `
          <button class="step-btn ${step.id === activeStep ? 'active' : ''}" data-step="${step.id}">${step.name}</button>
        `).join('');
      }

      function applyStepView() {
        const current = steps.find(step => step.id === activeStep);
        hintTextEl.textContent = `当前步骤：${current.hint}`;
        statusPillEl.textContent = current.status;
        reactionPillEl.textContent = current.reaction;
        tailPillEl.textContent = current.tail;
        recordPillEl.textContent = current.record;
        tubeFillEl.style.setProperty('--tube-fill', `${current.fill}px`);
        burnerFlameEl.style.setProperty('--flame-opacity', current.flame);
        tailLiquidEl.style.setProperty('--tail-liquid', `${current.tailLiquid}px`);
      }

      categoriesEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-category]');
        if (!button) return;
        activeCategory = button.dataset.category;
        const current = categories.find(category => category.id === activeCategory);
        activeTool = current.items[0].id;
        renderCategories();
        renderLibrary();
      });

      libraryListEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-item]');
        if (!button) return;
        activeTool = button.dataset.item;
        renderLibrary();
      });

      stepperEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-step]');
        if (!button) return;
        activeStep = button.dataset.step;
        renderSteps();
        applyStepView();
      });

      primaryActionEl.addEventListener('click', () => {
        const idx = steps.findIndex(step => step.id === activeStep);
        activeStep = steps[(idx + 1) % steps.length].id;
        renderSteps();
        applyStepView();
      });

      function enableDragging() {
        const items = document.querySelectorAll('.apparatus.draggable');
        const workspace = document.getElementById('workspace');
        items.forEach(item => {
          let startX = 0;
          let startY = 0;
          let initialLeft = 0;
          let initialTop = 0;
          let dragging = false;

          const onPointerMove = (event) => {
            if (!dragging) return;
            const dx = event.clientX - startX;
            const dy = event.clientY - startY;
            const nextLeft = initialLeft + dx;
            const nextTop = initialTop + dy;
            item.style.left = `${nextLeft}px`;
            item.style.top = `${nextTop}px`;
          };

          const stopDragging = () => {
            if (!dragging) return;
            dragging = false;
            item.classList.remove('dragging');
            document.body.style.userSelect = '';
            window.removeEventListener('pointermove', onPointerMove);
            window.removeEventListener('pointerup', stopDragging);
            window.removeEventListener('pointercancel', stopDragging);
          };

          item.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return;
            event.preventDefault();
            event.stopPropagation();
            document.querySelectorAll('.apparatus.selected').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            workspace.appendChild(item);
            dragging = true;
            startX = event.clientX;
            startY = event.clientY;
            initialLeft = parseFloat(item.style.left || 0);
            initialTop = parseFloat(item.style.top || 0);
            item.classList.add('dragging');
            document.body.style.userSelect = 'none';
            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', stopDragging);
            window.addEventListener('pointercancel', stopDragging);
          });
        });
      }

      renderCategories();
      renderLibrary();
      renderSteps();
      applyStepView();
      enableDragging();
    </script>
  </body>
</html>
