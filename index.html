<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebAI Chemistry Lab · 实验器材画布版</title>
    <meta
      name="description"
      content="WebAI Chemistry v0.6，NB 风格的实验器材画布版原型。"
    />
    <style>
      :root {
        --bg: #262c35;
        --bg-2: #1f252d;
        --panel: #2b323b;
        --panel-soft: #303845;
        --panel-line: rgba(255, 255, 255, 0.08);
        --text: #eef3f7;
        --muted: #9ba7b4;
        --muted-2: #7e8a96;
        --cyan: #67d8ff;
        --cyan-soft: rgba(103, 216, 255, 0.12);
        --green: #9cff88;
        --green-soft: rgba(156, 255, 136, 0.12);
        --yellow: #ffd76b;
        --yellow-soft: rgba(255, 215, 107, 0.12);
        --orange: #ffb769;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        color: var(--text);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 56px 1fr 76px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 16px;
        padding: 0 16px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        background: rgba(20, 26, 33, 0.44);
        backdrop-filter: blur(8px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
      }

      .brand-badge {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--cyan), #6a8cff);
        color: #162029;
      }

      .experiment-title {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }

      .tool-btn,
      .icon-btn,
      .step-btn,
      .category-btn,
      .library-item {
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        font: inherit;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr 312px;
        min-height: 0;
      }

      .canvas-shell {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 48%),
          linear-gradient(180deg, #353c46 0%, #262c35 100%);
      }

      .canvas-stage {
        position: absolute;
        inset: 0;
      }

      .bench-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.35;
        pointer-events: none;
      }

      .zoom-tag {
        position: absolute;
        left: 12px;
        bottom: 12px;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(20,26,33,0.72);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--muted);
        font-size: 13px;
      }

      .hint-tag {
        position: absolute;
        left: 16px;
        top: 14px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(20,26,33,0.68);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--text);
        font-size: 13px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 14px rgba(156, 255, 136, 0.5);
      }

      .workspace {
        position: absolute;
        inset: 0;
      }

      .stand {
        position: absolute;
        bottom: 120px;
        width: 130px;
        height: 360px;
      }

      .stand-base {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 24px;
        border-radius: 10px;
        background: linear-gradient(180deg, #4a515c, #2f3741);
      }

      .stand-rod {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 22px;
        width: 6px;
        height: 312px;
        border-radius: 999px;
        background: linear-gradient(180deg, #b2bbc3, #6b747e);
      }

      .clamp-bar {
        position: absolute;
        top: 122px;
        left: 28px;
        width: 74px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #9aa3ab, #6b747e);
      }

      .apparatus {
        position: absolute;
        transition: 0.35s ease;
      }

      .tube-body {
        position: absolute;
        left: 0;
        top: 0;
        width: 520px;
        height: 26px;
        border-radius: 999px;
        border: 3px solid rgba(255,255,255,0.7);
        background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
        box-shadow: inset 0 0 22px rgba(255,255,255,0.06);
      }

      .tube-fill {
        position: absolute;
        left: 10px;
        top: 7px;
        height: 10px;
        width: var(--tube-fill, 120px);
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255,215,107,0.96), rgba(255,183,105,0.8));
      }

      .tube-tip {
        position: absolute;
        right: -24px;
        top: 7px;
        width: 34px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(180deg, #d8c29f, #b48f63);
      }

      .gasbag {
        position: absolute;
        left: -108px;
        top: -8px;
        width: 96px;
        height: 44px;
        border-radius: 999px;
        background: radial-gradient(circle at 28% 28%, #f2cc7d, #b57e28);
        box-shadow: 0 10px 20px rgba(0,0,0,0.18);
      }

      .gasbag::after {
        content: "CO";
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #432b10;
        font-weight: 800;
        font-size: 14px;
      }

      .burner {
        position: absolute;
        width: 90px;
        height: 112px;
      }

      .burner-stand {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 74px;
        height: 20px;
        border-radius: 10px;
        background: linear-gradient(180deg, #b8bec7, #868e98);
      }

      .burner-body {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 44px;
        height: 54px;
        border-radius: 16px 16px 10px 10px;
        background: linear-gradient(180deg, #c68a24, #8b5c13);
      }

      .burner-flame {
        position: absolute;
        bottom: 62px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 34px;
        border-radius: 50% 50% 40% 40%;
        background: radial-gradient(circle at 50% 20%, #fff4b6, #ff8a3d 72%);
        opacity: var(--flame-opacity, 0.2);
      }

      .test-tube {
        position: absolute;
        width: 70px;
        height: 190px;
      }

      .test-tube-body {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 34px;
        height: 170px;
        border-radius: 0 0 20px 20px;
        border: 3px solid rgba(255,255,255,0.72);
        background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
      }

      .test-tube-liquid {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: 10px;
        width: 24px;
        height: var(--tube-liquid, 44px);
        border-radius: 0 0 16px 16px;
        background: linear-gradient(180deg, rgba(121,232,255,0.9), rgba(74,151,255,0.78));
      }

      .tube-hose {
        position: absolute;
        left: -30px;
        top: 16px;
        width: 70px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, #d7c19a, #b48f63);
        transform: rotate(-10deg);
        transform-origin: right center;
      }

      .chemical-group {
        position: absolute;
        display: flex;
        gap: 18px;
        align-items: end;
      }

      .bottle {
        width: 54px;
        height: 76px;
        position: relative;
      }

      .bottle-cap {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 12px;
        border-radius: 6px 6px 0 0;
        background: #b8bec7;
      }

      .bottle-body {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 62px;
        border-radius: 12px;
        border: 2px solid rgba(255,255,255,0.5);
        background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      }

      .bottle-label {
        position: absolute;
        left: 6px;
        right: 6px;
        top: 24px;
        padding: 4px 6px;
        border-radius: 6px;
        background: rgba(255,255,255,0.74);
        color: #22303a;
        font-size: 11px;
        text-align: center;
        font-weight: 700;
      }

      .small-tool {
        position: absolute;
        border-radius: 999px;
      }

      .spoon {
        width: 90px;
        height: 10px;
        background: linear-gradient(90deg, #c96f48, #f99a5b);
      }

      .match {
        width: 60px;
        height: 8px;
        background: linear-gradient(90deg, #c7b18a, #8b5c13);
      }

      .library {
        border-left: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(180deg, #2a313a 0%, #232a33 100%);
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 0;
      }

      .library-head {
        padding: 14px 14px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .library-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .library-head p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 13px;
      }

      .categories {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .category-btn {
        border-radius: 12px;
        padding: 10px 8px;
        cursor: pointer;
      }

      .category-btn.active {
        background: rgba(103,216,255,0.12);
        border-color: rgba(103,216,255,0.34);
      }

      .library-list {
        padding: 14px;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .library-item {
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .library-item:hover,
      .library-item.active {
        background: rgba(103,216,255,0.12);
        border-color: rgba(103,216,255,0.34);
      }

      .library-item strong {
        display: block;
        margin-bottom: 6px;
      }

      .library-item span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .bottombar {
        display: grid;
        grid-template-columns: 1.2fr 1.4fr 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 0 14px;
        border-top: 1px solid rgba(255,255,255,0.06);
        background: rgba(20, 26, 33, 0.54);
        backdrop-filter: blur(8px);
      }

      .stepper,
      .status-line,
      .records {
        display: flex;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .step-btn {
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
      }

      .step-btn.active {
        background: rgba(156,255,136,0.1);
        border-color: rgba(156,255,136,0.32);
      }

      .status-pill,
      .record-pill {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .primary-action {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: linear-gradient(135deg, var(--cyan), #7bf0d9);
        color: #1a242d;
        font-weight: 800;
        cursor: pointer;
      }

      @media (max-width: 1180px) {
        .main {
          grid-template-columns: 1fr;
        }

        .library {
          min-height: 420px;
        }

        .bottombar {
          grid-template-columns: 1fr;
          padding: 10px 14px;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-badge">⚗️</div>
          <div>WebAI Chemistry Lab</div>
        </div>
        <div class="experiment-title" id="experimentTitle">一氧化碳还原氧化铜 · 实验器材画布版 v0.6.0</div>
        <div class="toolbar">
          <button class="icon-btn" title="重置">↺</button>
          <button class="icon-btn" title="缩小">－</button>
          <button class="icon-btn" title="放大">＋</button>
          <button class="icon-btn" title="帮助">?</button>
        </div>
      </header>

      <main class="main">
        <section class="canvas-shell">
          <div class="canvas-stage">
            <div class="bench-grid"></div>
            <div class="hint-tag"><span class="dot"></span><span id="hintText">当前步骤：搭好装置后，点火加热氧化铜，再观察试管与尾气处理部分。</span></div>
            <div class="workspace">
              <div class="stand" style="left: 210px;">
                <div class="stand-rod"></div>
                <div class="clamp-bar"></div>
                <div class="stand-base"></div>
              </div>
              <div class="stand" style="left: 470px;">
                <div class="stand-rod"></div>
                <div class="clamp-bar"></div>
                <div class="stand-base"></div>
              </div>

              <div class="apparatus" id="mainTube" style="left: 240px; top: 188px; width: 560px; height: 60px;">
                <div class="gasbag"></div>
                <div class="tube-body">
                  <div class="tube-fill" id="tubeFill"></div>
                </div>
                <div class="tube-tip"></div>
              </div>

              <div class="apparatus burner" id="burner" style="left: 470px; top: 288px;">
                <div class="burner-flame" id="burnerFlame"></div>
                <div class="burner-body"></div>
                <div class="burner-stand"></div>
              </div>

              <div class="apparatus test-tube" style="left: 720px; top: 175px;">
                <div class="tube-hose"></div>
                <div class="test-tube-body"></div>
                <div class="test-tube-liquid" id="tailLiquid"></div>
              </div>

              <div class="chemical-group" style="left: 770px; top: 330px;">
                <div class="bottle">
                  <div class="bottle-cap"></div>
                  <div class="bottle-body"></div>
                  <div class="bottle-label">CuO</div>
                </div>
                <div class="bottle">
                  <div class="bottle-cap"></div>
                  <div class="bottle-body"></div>
                  <div class="bottle-label">Ca(OH)₂</div>
                </div>
                <div class="bottle">
                  <div class="bottle-cap"></div>
                  <div class="bottle-body"></div>
                  <div class="bottle-label">Cu</div>
                </div>
              </div>

              <div class="small-tool spoon" style="left: 846px; top: 430px;"></div>
              <div class="small-tool match" style="left: 792px; top: 428px;"></div>
            </div>
            <div class="zoom-tag">73%</div>
          </div>
        </section>

        <aside class="library">
          <div class="library-head">
            <h2>器材与药品库</h2>
            <p>这版不再是信息页，而是器材画布。右侧是器材库，中心是实验画布，底部是步骤与记录。</p>
          </div>
          <div class="categories" id="categories"></div>
          <div class="library-list" id="libraryList"></div>
        </aside>
      </main>

      <footer class="bottombar">
        <div class="stepper" id="stepper"></div>
        <div class="status-line">
          <div class="status-pill" id="statusPill">装置状态：已搭建基础实验装置</div>
          <div class="status-pill" id="reactionPill">反应状态：尚未加热</div>
          <div class="status-pill" id="tailPill">尾气处理：待观察</div>
        </div>
        <div class="records">
          <div class="record-pill" id="recordPill">观察记录：当前画布更强调器材、装置和实验空间。</div>
        </div>
        <button class="primary-action" id="primaryAction">执行当前步骤</button>
      </footer>
    </div>

    <script>
      const categories = [
        {
          id: 'device',
          name: '仪器',
          items: [
            { id: 'stand', name: '铁架台', desc: '搭建实验装置的支撑结构。' },
            { id: 'tube', name: '硬质玻璃管', desc: '主反应发生区域。' },
            { id: 'burner', name: '酒精灯', desc: '提供持续加热。' },
            { id: 'tailtube', name: '试管', desc: '观察尾气处理效果。' }
          ]
        },
        {
          id: 'reagent',
          name: '药品',
          items: [
            { id: 'co', name: '一氧化碳', desc: '作为还原剂通过导气装置进入主反应管。' },
            { id: 'cuo', name: '氧化铜', desc: '被还原的黑色固体。' },
            { id: 'lime', name: '澄清石灰水', desc: '用于尾气处理和现象观察。' },
            { id: 'cu', name: '铜', desc: '实验产物对照。' }
          ]
        },
        {
          id: 'tool',
          name: '工具',
          items: [
            { id: 'match', name: '火柴', desc: '点燃酒精灯。' },
            { id: 'spoon', name: '药匙', desc: '辅助取放药品。' },
            { id: 'observe', name: '观察镜头', desc: '用于后续局部放大观察。' },
            { id: 'reset', name: '复位工具', desc: '恢复当前画布状态。' }
          ]
        }
      ];

      const steps = [
        {
          id: 'setup',
          name: '步骤 1 · 搭装置',
          hint: '确认铁架台、玻璃管、尾气试管都已放在正确位置。',
          status: '装置状态：已搭建基础实验装置',
          reaction: '反应状态：尚未加热',
          tail: '尾气处理：待观察',
          record: '观察记录：当前画布更强调器材、装置和实验空间。',
          flame: 0.14,
          fill: 118,
          tailLiquid: 44
        },
        {
          id: 'ignite',
          name: '步骤 2 · 点燃酒精灯',
          hint: '点火后，主反应管下方开始受热，实验进入真正的过程阶段。',
          status: '装置状态：酒精灯已点燃',
          reaction: '反应状态：主反应管开始受热',
          tail: '尾气处理：继续导气',
          record: '观察记录：酒精灯点燃后，实验终于开始像一个“过程”而不是一张页面。',
          flame: 0.96,
          fill: 180,
          tailLiquid: 44
        },
        {
          id: 'observe',
          name: '步骤 3 · 观察现象',
          hint: '观察主反应区颜色变化，以及尾气试管中液体的处理效果。',
          status: '装置状态：加热稳定',
          reaction: '反应状态：氧化铜正在被还原',
          tail: '尾气处理：液面出现变化',
          record: '观察记录：主反应区和尾气试管开始出现可观察差异。下一步应继续细化动画与局部观察。',
          flame: 0.96,
          fill: 250,
          tailLiquid: 74
        }
      ];

      let activeCategory = 'device';
      let activeTool = 'stand';
      let activeStep = 'setup';

      const categoriesEl = document.getElementById('categories');
      const libraryListEl = document.getElementById('libraryList');
      const stepperEl = document.getElementById('stepper');
      const hintTextEl = document.getElementById('hintText');
      const statusPillEl = document.getElementById('statusPill');
      const reactionPillEl = document.getElementById('reactionPill');
      const tailPillEl = document.getElementById('tailPill');
      const recordPillEl = document.getElementById('recordPill');
      const primaryActionEl = document.getElementById('primaryAction');
      const tubeFillEl = document.getElementById('tubeFill');
      const burnerFlameEl = document.getElementById('burnerFlame');
      const tailLiquidEl = document.getElementById('tailLiquid');

      function renderCategories() {
        categoriesEl.innerHTML = categories.map(category => `
          <button class="category-btn ${category.id === activeCategory ? 'active' : ''}" data-category="${category.id}">${category.name}</button>
        `).join('');
      }

      function renderLibrary() {
        const current = categories.find(category => category.id === activeCategory);
        libraryListEl.innerHTML = current.items.map(item => `
          <button class="library-item ${item.id === activeTool ? 'active' : ''}" data-item="${item.id}">
            <strong>${item.name}</strong>
            <span>${item.desc}</span>
          </button>
        `).join('');
      }

      function renderSteps() {
        stepperEl.innerHTML = steps.map(step => `
          <button class="step-btn ${step.id === activeStep ? 'active' : ''}" data-step="${step.id}">${step.name}</button>
        `).join('');
      }

      function applyStepView() {
        const current = steps.find(step => step.id === activeStep);
        hintTextEl.textContent = `当前步骤：${current.hint}`;
        statusPillEl.textContent = current.status;
        reactionPillEl.textContent = current.reaction;
        tailPillEl.textContent = current.tail;
        recordPillEl.textContent = current.record;
        tubeFillEl.style.setProperty('--tube-fill', `${current.fill}px`);
        burnerFlameEl.style.setProperty('--flame-opacity', current.flame);
        tailLiquidEl.style.setProperty('--tube-liquid', `${current.tailLiquid}px`);
      }

      categoriesEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-category]');
        if (!button) return;
        activeCategory = button.dataset.category;
        const current = categories.find(category => category.id === activeCategory);
        activeTool = current.items[0].id;
        renderCategories();
        renderLibrary();
      });

      libraryListEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-item]');
        if (!button) return;
        activeTool = button.dataset.item;
        renderLibrary();
      });

      stepperEl.addEventListener('click', (event) => {
        const button = event.target.closest('[data-step]');
        if (!button) return;
        activeStep = button.dataset.step;
        renderSteps();
        applyStepView();
      });

      primaryActionEl.addEventListener('click', () => {
        const idx = steps.findIndex(step => step.id === activeStep);
        if (idx < steps.length - 1) {
          activeStep = steps[idx + 1].id;
        } else {
          activeStep = steps[0].id;
        }
        renderSteps();
        applyStepView();
      });

      renderCategories();
      renderLibrary();
      renderSteps();
      applyStepView();
    </script>
  </body>
</html>
